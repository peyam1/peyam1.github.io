<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#B9772E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Boulangerie">
<title>Ma Boulangerie — Gestion</title>
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="favicon.png">
<link rel="manifest" href="manifest.webmanifest">
<style>
  :root{
    --bg:#FBF7F1; --surface:#FFFFFF; --surface-2:#FFF6E9;
    --ink:#2A2521; --ink-soft:#6B6258; --line:#ECE1D2;
    --crust:#B9772E; --crust-dk:#8A5618; --honey:#E7A529;
    --income:#2F7D55; --income-bg:#E8F2EC;
    --expense:#C0492F; --expense-bg:#F8E9E5;
    --radius:16px; --radius-sm:12px;
    --shadow:0 2px 12px rgba(90,55,15,.07);
    --shadow-lg:0 8px 30px rgba(90,55,15,.16);
    --tab-h:64px; --top-h:54px;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    --mono:ui-monospace,"SF Mono","Roboto Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:var(--sans);color:var(--ink);background:var(--bg);font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased;overscroll-behavior-y:none;}
  #app{max-width:520px;margin:0 auto;min-height:100vh;position:relative;}

  .topbar{position:sticky;top:0;z-index:30;height:calc(var(--top-h) + env(safe-area-inset-top));padding-top:env(safe-area-inset-top);display:flex;align-items:center;justify-content:space-between;gap:10px;padding-left:16px;padding-right:14px;background:var(--crust);color:#fff;box-shadow:0 2px 8px rgba(90,55,15,.18);}
  .topbar .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:16px;letter-spacing:-.2px;min-width:0;}
  .topbar .brand .logo{width:30px;height:30px;border-radius:9px;background:rgba(255,255,255,.16);display:grid;place-items:center;font-size:17px;flex:none;}
  .topbar .brand .bn{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .user-chip{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.17);border:none;color:#fff;font-family:inherit;font-weight:700;font-size:12.5px;padding:7px 11px;border-radius:999px;cursor:pointer;max-width:150px;flex:none;}
  .user-chip .un{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px;}

  main#screen{padding:16px 16px calc(var(--tab-h) + env(safe-area-inset-bottom) + 18px);min-height:calc(100vh - var(--top-h));}
  .section-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:2px 0 12px;}
  .section-head h2{font-size:20px;font-weight:800;letter-spacing:-.4px;margin:0;}
  .section-head .sub{color:var(--ink-soft);font-size:13px;}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);}
  .card.pad{padding:16px;}
  .card + .card{margin-top:12px;}

  .money{font-family:var(--mono);font-variant-numeric:tabular-nums;font-feature-settings:"tnum";letter-spacing:-.3px;}
  .pos{color:var(--income);} .neg{color:var(--expense);}

  .kpis{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:14px;}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:13px 14px;box-shadow:var(--shadow);}
  .kpi .label{font-size:11.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-soft);font-weight:700;}
  .kpi .val{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:20px;font-weight:700;margin-top:5px;letter-spacing:-.5px;}
  .kpi .meta{font-size:12px;color:var(--ink-soft);margin-top:2px;}

  .receipt{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--radius);padding:18px 18px 16px;position:relative;box-shadow:var(--shadow);overflow:hidden;}
  .receipt::before{content:"";position:absolute;top:-9px;left:0;right:0;height:9px;background-image:radial-gradient(circle at 9px 0, transparent 0 8px, var(--surface-2) 9px);background-size:18px 18px;background-position:center top;}
  .receipt .r-label{font-size:12px;letter-spacing:.8px;text-transform:uppercase;color:var(--ink-soft);font-weight:700;}
  .receipt .r-amount{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:34px;font-weight:700;letter-spacing:-1px;margin:4px 0 14px;}
  .receipt .r-rows{display:flex;gap:10px;}
  .receipt .r-row{flex:1;background:#fff;border:1px solid var(--line);border-radius:var(--radius-sm);padding:9px 11px;}
  .receipt .r-row .t{font-size:11px;color:var(--ink-soft);font-weight:600;display:flex;align-items:center;gap:5px;}
  .receipt .r-row .n{font-family:var(--mono);font-variant-numeric:tabular-nums;font-weight:700;font-size:15px;margin-top:3px;}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;}

  .list{display:flex;flex-direction:column;}
  .row{display:flex;align-items:center;gap:12px;padding:13px 14px;border-bottom:1px solid var(--line);background:var(--surface);}
  .row:first-child{border-top-left-radius:var(--radius);border-top-right-radius:var(--radius);}
  .row:last-child{border-bottom:none;border-bottom-left-radius:var(--radius);border-bottom-right-radius:var(--radius);}
  .row.tap{cursor:pointer;} .row.tap:active{background:var(--surface-2);}
  .row .ic{width:40px;height:40px;border-radius:11px;flex:none;display:grid;place-items:center;font-size:19px;background:var(--surface-2);}
  .row .body{flex:1;min-width:0;}
  .row .body .t{font-weight:650;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .row .body .s{font-size:12.5px;color:var(--ink-soft);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .row .end{text-align:right;flex:none;display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
  .row .end .amt{font-family:var(--mono);font-variant-numeric:tabular-nums;font-weight:700;font-size:15px;}

  .badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;background:var(--surface-2);color:var(--ink-soft);border:1px solid var(--line);}
  .badge.low{background:var(--expense-bg);color:var(--expense);border-color:#efc9bf;}
  .badge.ok{background:var(--income-bg);color:var(--income);border-color:#c4e2d2;}
  .badge.active{background:var(--income);color:#fff;border-color:var(--income);}

  .btn{appearance:none;border:none;font-family:inherit;font-size:15px;font-weight:700;border-radius:var(--radius-sm);padding:13px 16px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;line-height:1;transition:transform .05s ease, filter .15s ease;}
  .btn:active{transform:scale(.97);}
  .btn-primary{background:var(--crust);color:#fff;} .btn-primary:active{background:var(--crust-dk);}
  .btn-block{width:100%;}
  .btn-ghost{background:var(--surface);color:var(--ink);border:1px solid var(--line);}
  .btn-danger{background:var(--expense-bg);color:var(--expense);border:1px solid #efc9bf;}
  .btn-sm{padding:9px 12px;font-size:13.5px;border-radius:10px;}
  .btn-icon{width:46px;height:46px;padding:0;border-radius:12px;font-size:22px;flex:none;}
  .fab-add{display:inline-flex;align-items:center;gap:7px;background:var(--crust);color:#fff;border:none;border-radius:999px;padding:9px 15px;font-weight:700;font-size:13.5px;cursor:pointer;flex:none;}
  .fab-add:active{background:var(--crust-dk);}

  .empty{text-align:center;padding:46px 24px;color:var(--ink-soft);}
  .empty .e-ic{font-size:40px;margin-bottom:10px;opacity:.7;}
  .empty .e-t{font-weight:700;color:var(--ink);margin-bottom:4px;font-size:16px;}
  .empty .e-s{font-size:13.5px;}

  .pos-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .prod-btn{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px;text-align:left;cursor:pointer;box-shadow:var(--shadow);}
  .prod-btn:active{transform:scale(.97);border-color:var(--crust);}
  .prod-btn .pn{font-weight:700;font-size:14px;line-height:1.25;}
  .prod-btn .pp{font-family:var(--mono);font-variant-numeric:tabular-nums;color:var(--crust-dk);font-weight:700;margin-top:6px;font-size:14px;}
  .prod-btn .pst{font-size:11px;color:var(--ink-soft);margin-top:3px;}
  .prod-btn .pst.lo{color:var(--expense);font-weight:700;}

  .cart-line{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line);}
  .cart-line:last-child{border-bottom:none;}
  .cart-line .cn{flex:1;min-width:0;}
  .cart-line .cn .t{font-weight:650;font-size:14.5px;}
  .cart-line .cn .s{font-family:var(--mono);font-size:12px;color:var(--ink-soft);}
  .stepper{display:flex;align-items:center;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff;}
  .stepper button{width:32px;height:32px;border:none;background:#fff;font-size:18px;font-weight:700;color:var(--crust);cursor:pointer;line-height:1;}
  .stepper button:active{background:var(--surface-2);}
  .stepper .q{min-width:30px;text-align:center;font-family:var(--mono);font-weight:700;font-size:14px;}
  .cart-line .lt{font-family:var(--mono);font-variant-numeric:tabular-nums;font-weight:700;width:78px;text-align:right;font-size:14px;}
  .cart-total{display:flex;justify-content:space-between;align-items:baseline;padding-top:12px;margin-top:4px;border-top:2px dashed var(--line);}
  .cart-total .lab{font-weight:700;}
  .cart-total .amt{font-family:var(--mono);font-variant-numeric:tabular-nums;font-weight:700;font-size:24px;letter-spacing:-.5px;}

  .field{margin-bottom:13px;}
  .field label{display:block;font-size:12.5px;font-weight:700;color:var(--ink-soft);margin-bottom:6px;letter-spacing:.2px;}
  .field input,.field select,.field textarea{width:100%;font-family:inherit;font-size:16px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px 13px;outline:none;}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--crust);box-shadow:0 0 0 3px rgba(185,119,46,.13);}
  .field .num{font-family:var(--mono);}
  .field-row{display:flex;gap:11px;} .field-row .field{flex:1;}
  .seg{display:flex;gap:8px;flex-wrap:wrap;}
  .seg .opt{flex:1;min-width:calc(50% - 4px);border:1px solid var(--line);background:#fff;border-radius:10px;padding:11px;text-align:center;font-weight:700;font-size:14px;cursor:pointer;color:var(--ink-soft);}
  .seg .opt.on{background:var(--crust);border-color:var(--crust);color:#fff;}

  .overlay{position:fixed;inset:0;z-index:50;background:rgba(40,28,18,.45);display:flex;align-items:flex-end;justify-content:center;animation:fade .15s ease;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal,.sheet{width:100%;max-width:520px;background:var(--bg);border-radius:22px 22px 0 0;max-height:92vh;overflow-y:auto;animation:slideup .22s cubic-bezier(.2,.8,.2,1);padding-bottom:calc(env(safe-area-inset-bottom) + 8px);}
  @keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal-head{position:sticky;top:0;background:var(--bg);padding:16px 18px 10px;display:flex;align-items:center;justify-content:space-between;z-index:2;}
  .modal-head h3{margin:0;font-size:18px;font-weight:800;letter-spacing:-.3px;}
  .modal-head .x{width:34px;height:34px;border-radius:50%;border:none;background:var(--surface-2);font-size:18px;cursor:pointer;color:var(--ink-soft);}
  .modal-body{padding:4px 18px 18px;}
  .grip{width:38px;height:4px;background:var(--line);border-radius:999px;margin:9px auto 0;}

  .menu-item{display:flex;align-items:center;gap:14px;padding:15px 18px;border-bottom:1px solid var(--line);cursor:pointer;background:transparent;width:100%;border:none;text-align:left;}
  .menu-item:active{background:var(--surface-2);}
  .menu-item .mi-ic{width:42px;height:42px;border-radius:12px;background:var(--surface-2);display:grid;place-items:center;font-size:20px;flex:none;}
  .menu-item .mi-t{font-weight:700;font-size:15.5px;}
  .menu-item .mi-s{font-size:12.5px;color:var(--ink-soft);}
  .menu-item .chev{margin-left:auto;color:var(--ink-soft);font-size:20px;}

  .tabbar{position:fixed;left:0;right:0;bottom:0;z-index:40;height:calc(var(--tab-h) + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:#fff;border-top:1px solid var(--line);display:flex;max-width:520px;margin:0 auto;box-shadow:0 -2px 14px rgba(90,55,15,.06);}
  .tab{flex:1;border:none;background:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--ink-soft);padding-top:7px;}
  .tab .ti{font-size:21px;line-height:1;filter:grayscale(.4);opacity:.7;}
  .tab .tl{font-size:10.5px;font-weight:700;letter-spacing:.2px;}
  .tab.active{color:var(--crust);}
  .tab.active .ti{filter:none;opacity:1;transform:translateY(-1px);}

  .chart{display:flex;align-items:flex-end;gap:6px;height:96px;padding-top:6px;}
  .chart .bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;justify-content:flex-end;}
  .chart .bar{width:78%;max-width:30px;background:linear-gradient(180deg,var(--honey),var(--crust));border-radius:5px 5px 2px 2px;min-height:3px;transition:height .4s ease;}
  .chart .bl{font-size:10px;color:var(--ink-soft);font-weight:600;}

  .toast{position:fixed;left:50%;bottom:calc(var(--tab-h) + env(safe-area-inset-bottom) + 16px);transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:999px;font-size:14px;font-weight:600;z-index:80;opacity:0;transition:opacity .2s,transform .2s;box-shadow:var(--shadow-lg);pointer-events:none;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .hint{font-size:12.5px;color:var(--ink-soft);background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:11px 13px;line-height:1.5;}

  /* Connexion / configuration */
  .auth-wrap{min-height:calc(100vh - 40px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 22px;}
  .auth-logo{width:74px;height:74px;border-radius:20px;background:var(--crust);display:grid;place-items:center;font-size:40px;box-shadow:var(--shadow-lg);margin-bottom:14px;}
  .auth-title{font-size:23px;font-weight:800;letter-spacing:-.4px;text-align:center;}
  .auth-sub{color:var(--ink-soft);font-size:13.5px;margin:6px 0 20px;text-align:center;line-height:1.5;}
  .auth-card{width:100%;max-width:380px;}
  .auth-pick{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;justify-content:center;}
  .auth-pick .pu{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:8px 14px;font-weight:700;font-size:13px;cursor:pointer;color:var(--ink);}
  .auth-pick .pu:active{background:var(--surface-2);transform:scale(.97);}
  .auth-foot{font-size:11.5px;color:var(--ink-soft);text-align:center;margin-top:14px;line-height:1.5;}
  .total-strip{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:13px;}
  .total-strip .lab{font-weight:700;font-size:13px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.5px;}
  .total-strip .amt{font-family:var(--mono);font-variant-numeric:tabular-nums;font-weight:700;font-size:19px;}

  /* Ticket / reçu */
  .ticket{font-family:var(--mono);background:#fff;color:#111;max-width:300px;margin:0 auto;padding:16px 18px;font-size:12.5px;line-height:1.55;border:1px solid var(--line);border-radius:10px;}
  .tk-head{text-align:center;}
  .tk-name{font-weight:700;font-size:15px;letter-spacing:.5px;text-transform:uppercase;}
  .tk-sub{font-size:11px;}
  .tk-sep{border-top:1px dashed #aaa;margin:9px 0;}
  .tk-meta div{font-size:11.5px;}
  .tk-line{display:flex;gap:6px;}
  .tk-line .tk-q{flex:none;width:30px;}
  .tk-line .tk-n{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .tk-line .tk-a{flex:none;text-align:right;min-width:60px;}
  .tk-total{display:flex;justify-content:space-between;font-weight:700;font-size:14px;}
  .tk-pay{font-size:11.5px;margin-top:3px;}
  .tk-credit{text-align:center;font-weight:700;margin-top:9px;font-size:12px;border:1px dashed #888;padding:6px;border-radius:6px;}
  .tk-foot{text-align:center;font-size:11.5px;}

  /* Rapport imprimable A4 */
  .report{font-family:var(--sans);color:#111;background:#fff;max-width:720px;margin:0 auto;padding:8px;font-size:13px;}
  .report .rp-head{text-align:center;border-bottom:2px solid #111;padding-bottom:10px;margin-bottom:14px;}
  .report .rp-name{font-size:20px;font-weight:800;}
  .report .rp-sub{font-size:12px;color:#555;}
  .report .rp-title{font-size:15px;font-weight:700;margin-top:8px;}
  .report h4{font-size:14px;margin:16px 0 6px;border-bottom:1px solid #ccc;padding-bottom:3px;}
  .report table{width:100%;border-collapse:collapse;margin-bottom:6px;}
  .report th,.report td{text-align:left;padding:6px 8px;border-bottom:1px solid #e5e5e5;font-size:12.5px;}
  .report th{background:#f3f3f3;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;}
  .report td.r,.report th.r{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;}
  .report tr.tot td{font-weight:800;border-top:2px solid #111;border-bottom:2px solid #111;background:#faf6ef;}
  .report .rp-foot{text-align:center;font-size:11px;color:#777;margin-top:18px;border-top:1px solid #ccc;padding-top:8px;}

  #printArea{display:none;}
  @media print{
    body{background:#fff;}
    #app,#modalRoot,#toast{display:none !important;}
    #printArea{display:block !important;padding:0;margin:0;}
    #printArea .ticket{border:none;border-radius:0;max-width:none;width:100%;padding:0;}
    #printArea .report{max-width:none;padding:0;}
    .report tr,.report table{page-break-inside:avoid;}
  }
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="brand"><span class="logo">🥖</span><span class="bn" id="brandName">PEYAM Boulangerie</span></div>
    <button class="user-chip" data-action="switchUser">👤 <span class="un" id="activeUserName">—</span> ▾</button>
  </header>
  <main id="screen"></main>
  <nav class="tabbar" id="tabbar"></nav>
</div>
<div id="modalRoot"></div>
<div id="printArea"></div>
<div class="toast" id="toast"></div>

<script>
"use strict";

/* ====================================================================
   🔐 CODE D'ACCÈS — à changer AVANT de mettre l'application en ligne.
   Il est demandé UNE SEULE FOIS, pour créer le compte administrateur
   sur un appareil. Ne le communiquez qu'aux personnes de confiance.
   (Astuce : choisissez quelque chose de personnel et difficile à deviner.)
   ==================================================================== */
const ACCESS_CODE = "BOULANGERIE-2026";

/* ============================ Stockage ============================ */
const KEY = "boulangerie_data_v1";
const Store = (() => {
  let mem = null;
  function avail(){ try{ const k="__t__"; localStorage.setItem(k,"1"); localStorage.removeItem(k); return true; }catch(e){ return false; } }
  const ok = avail();
  return {
    persistent: ok,
    get(){ if(ok){ try{ return JSON.parse(localStorage.getItem(KEY) || "null"); }catch(e){ return null; } } return mem; },
    set(d){ if(ok){ try{ localStorage.setItem(KEY, JSON.stringify(d)); return; }catch(e){} } mem = d; }
  };
})();

/* ============================ Données ============================ */
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function defaultData(){
  const c1 = uid();
  return {
    settings:{ nom:"PEYAM Boulangerie", devise:"HTG", caisseInitiale:0, adresse:"", telephone:"", activeUserId:c1, compteurVente:0 },
    caissiers:[{id:c1, nom:"Administrateur", role:"admin"}],
    clients:[],
    produits:[
      {id:uid(), nom:"Pain ordinaire", cat:"Pain",         pv:25,  pr:12,  stock:60, unite:"pièce",     seuil:15},
      {id:uid(), nom:"Croissant",      cat:"Viennoiserie", pv:50,  pr:25,  stock:40, unite:"pièce",     seuil:10},
      {id:uid(), nom:"Gâteau",         cat:"Pâtisserie",   pv:600, pr:300, stock:6,  unite:"pièce",     seuil:3},
      {id:uid(), nom:"Jus",            cat:"Boisson",      pv:75,  pr:40,  stock:24, unite:"bouteille", seuil:6}
    ],

function localKey(d){ const x=new Date(d); return x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0")+"-"+String(x.getDate()).padStart(2,"0"); }
function todayKey(){ return localKey(new Date()); }
function fmtDate(iso){ return new Date(iso).toLocaleDateString("fr-FR",{day:"2-digit",month:"short"}); }
function fmtDateTime(iso){ const d=new Date(iso); return d.toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric"})+" "+d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

/* Caisse = caisse initiale + ventes encaissées (hors crédit) + règlements − décaissements − paie */
function soldeCaisse(){
  const cashVentes = sum(db.ventes.filter(v=>v.paiement!=="Crédit"), v=>v.total);
  return (Number(db.settings.caisseInitiale)||0)
    + cashVentes
    + sum(db.reglements, r=>r.montant)
    - sum(db.decaissements, d=>d.montant)
    - sum(db.paiements, p=>p.montant);
}
function clientBalance(id){
  const credits = sum(db.ventes.filter(v=>v.clientId===id && v.paiement==="Crédit"), v=>v.total);
  const regs = sum(db.reglements.filter(r=>r.clientId===id), r=>r.montant);
  return credits - regs;
}
function creditsTotal(){ return db.clients.reduce((a,c)=>a + Math.max(0, clientBalance(c.id)), 0); }

let currentPay = "Espèces";
function venteProductsHTML(){
  if(!db.produits.length){
    return `<div class="empty"><div class="e-ic">🥐</div><div class="e-t">Aucun produit</div><div class="e-s">Ajoutez vos produits pour commencer à vendre.</div><div style="margin-top:14px"><button class="btn btn-primary" data-nav="produits">Ajouter un produit</button></div></div>`;
  }
  return `<div class="pos-grid">` + db.produits.map(p=>{
    const lo = Number(p.stock)<=Number(p.seuil);
    return `<button class="prod-btn" data-action="addCart" data-id="${p.id}"><div class="pn">${esc(p.nom)}</div><div class="pp">${money(p.pv)}</div><div class="pst ${lo?"lo":""}">Stock : ${num(p.stock)} ${esc(p.unite)}</div></button>`;
  }).join("") + `</div>`;
}
function cartSectionHTML(){
  if(!state.cart.length){ return `<div class="hint">🧺 Le panier est vide. Touchez un produit ci-dessus pour l'ajouter.</div>`; }
  const total = sum(state.cart, l=>l.qte*l.prix);
  const lines = state.cart.map((l,i)=>`
    <div class="cart-line">
      <div class="cn"><div class="t">${esc(l.nom)}</div><div class="s">${money(l.prix)} × ${l.qte}</div></div>
      <div class="stepper"><button data-action="cartDec" data-i="${i}">−</button><span class="q">${l.qte}</span><button data-action="cartInc" data-i="${i}">+</button></div>
      <div class="lt money">${num(l.qte*l.prix)}</div>
    </div>`).join("");
  const clientOpts = `<option value="">— Aucun (vente directe) —</option>` + db.clients.map(c=>`<option value="${c.id}" ${c.id===state.cartClientId?"selected":""}>${esc(c.nom)}</option>`).join("");
  const recuVal = state.cartRecu||"";
  const showCash = currentPay==="Espèces";
  const r = parseFloat(recuVal);
  const monnaie = (showCash && !isNaN(r)) ? Math.max(0, r-total) : 0;
  return `
    <div class="card pad">${lines}<div class="cart-total"><span class="lab">Total</span><span class="amt money">${money(total)}</span></div></div>
    <div class="field" style="margin-top:13px">
      <label>Client (pour vente à crédit ou suivi)</label>
      <div style="display:flex;gap:8px">
        <select id="cartClient" style="flex:1">${clientOpts}</select>
        <button class="btn btn-ghost btn-icon" data-action="quickClient" title="Nouveau client">＋</button>
      </div>
    </div>
    <div class="field"><label>Mode de paiement</label>
      <div class="seg" id="paySeg">${PAY_METHODS.map(m=>`<div class="opt ${m===currentPay?"on":""}" data-action="pickPay" data-pay="${m}">${m}</div>`).join("")}</div>
    </div>
    <div class="field" id="cashField" style="${showCash?"":"display:none"}">
      <label>Montant reçu (espèces)</label>
      <input id="cartRecu" class="num" inputmode="decimal" value="${recuVal}" placeholder="0">
      <div id="monnaieLine" style="margin-top:8px;font-family:var(--mono);font-weight:700;color:var(--income);${(showCash && !isNaN(r))?"":"display:none"}">Monnaie à rendre : ${num(monnaie)}</div>
    </div>
    <button class="btn btn-primary btn-block" data-action="checkout" style="font-size:17px;padding:15px">✅ Encaisser ${money(total)}</button>
    <button class="btn btn-ghost btn-block" data-action="clearCart" style="margin-top:9px">Vider le panier</button>
  `;
}
VIEWS.vente = function(){
  return `
  <div class="section-head"><div><h2>Point de vente</h2><div class="sub">Caissier : ${esc(activeUser().nom)}</div></div></div>
  ${venteProductsHTML()}
  <div style="height:16px"></div>
  <div id="cartSection">${cartSectionHTML()}</div>

AFTER.vente = function(){
  const cs = document.getElementById("cartSection");
  if(!cs) return;
  cs.addEventListener("change", e=>{ if(e.target.id==="cartClient") state.cartClientId=e.target.value; });
  cs.addEventListener("input", e=>{ if(e.target.id==="cartRecu"){ state.cartRecu=e.target.value; updateMonnaie(); } });
};
function refreshCart(){ const el=document.getElementById("cartSection"); if(el) el.innerHTML=cartSectionHTML(); }
function updateMonnaie(){
  const ml=document.getElementById("monnaieLine"); if(!ml) return;
  const total=sum(state.cart,l=>l.qte*l.prix); const r=parseFloat(state.cartRecu);
  if(currentPay==="Espèces" && !isNaN(r)){ ml.style.display=""; ml.textContent="Monnaie à rendre : "+num(Math.max(0,r-total)); }
  else ml.style.display="none";
}

function showReceipt(id, justSold){

  openModal("Reçu", `
    <div class="ticket">${ticketInner(s)}</div>
    <div style="display:flex;gap:10px;margin-top:14px">
      <button class="btn btn-primary btn-block" data-action="printReceipt" data-id="${s.id}">🖨️ Imprimer</button>

function printReceipt(id){
  const s=db.ventes.find(v=>v.id===id); if(!s) return;

function clientDetailHTML(c){

      <div class="r-amount money ${bal>0?"neg":"pos"}">${money(bal)}</div>

/* ---- Rapports ---- */
let reportPeriod = "7j";
function periodStart(p){
  const d=new Date(); d.setHours(0,0,0,0);
  if(p==="jour") return d;
  if(p==="7j"){ d.setDate(d.getDate()-6); return d; }
  if(p==="30j"){ d.setDate(d.getDate()-29); return d; }
  return new Date(0);
}
VIEWS.rapports = function(){
  const start=periodStart(reportPeriod);
  const inP = iso => new Date(iso) >= start;
  const ventes=db.ventes.filter(v=>inP(v.date));
  const decs=db.decaissements.filter(d=>inP(d.date));
  const pays=db.paiements.filter(p=>inP(p.date));
  const regs=db.reglements.filter(r=>inP(r.date));
  const ca=sum(ventes,v=>v.total);
  const dep=sum(decs,d=>d.montant);
  const sal=sum(pays,p=>p.montant);
  const creditAccorde=sum(ventes.filter(v=>v.paiement==="Crédit"),v=>v.total);
  const creditEncaisse=sum(regs,r=>r.montant);
  const benef=ca-dep-sal;

  const map={};
  ventes.forEach(v=>v.items.forEach(it=>{ const k=it.nom; map[k]=map[k]||{q:0,ca:0}; map[k].q+=it.qte; map[k].ca+=it.qte*it.prix; }));
  const top=Object.entries(map).sort((a,b)=>b[1].ca-a[1].ca).slice(0,5);

  const byUser={};
  ventes.forEach(v=>{ const k=v.userNom||"—"; byUser[k]=byUser[k]||{ca:0,n:0}; byUser[k].ca+=v.total; byUser[k].n++; });
  const usersArr=Object.entries(byUser).sort((a,b)=>b[1].ca-a[1].ca);

  const labels={jour:"Aujourd'hui","7j":"7 jours","30j":"30 jours",tout:"Tout"};
  return `
  <div class="section-head"><div><h2>Rapports</h2><div class="sub">Période : ${labels[reportPeriod]}</div></div></div>
  <div class="seg" id="periodSeg" style="margin-bottom:12px">
    ${["jour","7j","30j","tout"].map(p=>`<div class="opt ${p===reportPeriod?"on":""}" data-action="pickPeriod" data-p="${p}">${labels[p]}</div>`).join("")}
  </div>
  <button class="btn btn-ghost btn-block" data-action="printReport" style="margin-bottom:14px">⬇️ Exporter le rapport en PDF</button>

  <div class="receipt">
    <div class="r-label">Bénéfice net</div>
    <div class="r-amount money ${benef>=0?"pos":"neg"}">${money(benef)}</div>
    <div class="r-rows">
      <div class="r-row"><div class="t"><span class="dot" style="background:var(--income)"></span>Chiffre d'affaires</div><div class="n pos">${money(ca)}</div></div>
      <div class="r-row"><div class="t"><span class="dot" style="background:var(--expense)"></span>Dépenses + paie</div><div class="n neg">${money(dep+sal)}</div></div>
    </div>
  </div>

  <div class="kpis" style="margin-top:14px">
    <div class="kpi"><div class="label">Ventes</div><div class="val">${ventes.length}</div><div class="meta">${money(ca)}</div></div>
    <div class="kpi"><div class="label">Panier moyen</div><div class="val">${money(ventes.length?ca/ventes.length:0)}</div></div>
    <div class="kpi"><div class="label">Crédit accordé</div><div class="val neg">${money(creditAccorde)}</div></div>
    <div class="kpi"><div class="label">Règlements reçus</div><div class="val pos">${money(creditEncaisse)}</div></div>
  </div>

  ${usersArr.length>1 || (usersArr.length===1) ? `
  <div class="card pad">
    <strong style="font-size:15px;display:block;margin-bottom:10px">Ventes par caissier</strong>
    <div class="list" style="margin:0 -16px -16px">
      ${usersArr.map(u=>`<div class="row" style="background:transparent"><span class="ic">👤</span><div class="body"><div class="t">${esc(u[0])}</div><div class="s">${u[1].n} vente(s)</div></div><div class="end"><div class="amt pos money">${money(u[1].ca)}</div></div></div>`).join("")}
    </div>
  </div>`:""}

  <div class="card pad" style="margin-top:12px">
    <strong style="font-size:15px;display:block;margin-bottom:10px">Top produits</strong>
    ${top.length ? `<div class="list" style="margin:0 -16px -16px">${top.map((t,i)=>`<div class="row" style="background:transparent"><span class="ic">${i===0?"🥇":i===1?"🥈":i===2?"🥉":"🔹"}</span><div class="body"><div class="t">${esc(t[0])}</div><div class="s">${num(t[1].q)} vendu(s)</div></div><div class="end"><div class="amt pos money">${money(t[1].ca)}</div></div></div>`).join("")}</div>` : `<div class="hint">Aucune vente sur cette période.</div>`}
  </div>`;
};

  const creditAccorde=sum(ventes.filter(v=>v.paiement==="Crédit"),v=>v.total);
  const creditEncaisse=sum(regs,r=>r.montant);
  const benef=ca-dep-sal;
  const map={};
  ventes.forEach(v=>v.items.forEach(it=>{ map[it.nom]=map[it.nom]||{q:0,ca:0}; map[it.nom].q+=it.qte; map[it.nom].ca+=it.qte*it.prix; }));
  const prod=Object.entries(map).sort((a,b)=>b[1].ca-a[1].ca);
  const byUser={};
  ventes.forEach(v=>{ const k=v.userNom||"—"; byUser[k]=byUser[k]||{ca:0,n:0}; byUser[k].ca+=v.total; byUser[k].n++; });
  const usersArr=Object.entries(byUser).sort((a,b)=>b[1].ca-a[1].ca);

  const set=db.settings;
  const tr = rows => rows.map(r=>`<tr><td>${r[0]}</td><td class="r">${r[1]}</td></tr>`).join("");
  return `<div class="report">

      <div class="rp-sub">Édité le ${fmtDateTime(new Date().toISOString())} par ${esc(activeUser().nom)}</div>
    </div>

    <h4>Résumé financier</h4>
    <table>
      <tr><td>Chiffre d'affaires (${ventes.length} ventes)</td><td class="r">${money(ca)}</td></tr>
      <tr><td>Décaissements</td><td class="r">− ${money(dep)}</td></tr>
      <tr><td>Salaires versés</td><td class="r">− ${money(sal)}</td></tr>
      <tr class="tot"><td>Bénéfice net</td><td class="r">${money(benef)}</td></tr>
      <tr><td>Panier moyen</td><td class="r">${money(ventes.length?ca/ventes.length:0)}</td></tr>
      <tr><td>Crédit accordé sur la période</td><td class="r">${money(creditAccorde)}</td></tr>
      <tr><td>Règlements de crédit encaissés</td><td class="r">${money(creditEncaisse)}</td></tr>

      <tr><td>Total des crédits clients en cours</td><td class="r">${money(creditsTotal())}</td></tr>
    </table>

    <h4>Ventes par caissier</h4>
    <table><tr><th>Caissier</th><th class="r">Ventes / Total</th></tr>
      ${usersArr.length?usersArr.map(u=>`<tr><td>${esc(u[0])}</td><td class="r">${u[1].n} · ${money(u[1].ca)}</td></tr>`).join(""):`<tr><td colspan="2">Aucune vente</td></tr>`}
    </table>

    <h4>Détail des produits vendus</h4>
    <table><tr><th>Produit</th><th class="r">Qté · CA</th></tr>
      ${prod.length?prod.map(p=>`<tr><td>${esc(p[0])}</td><td class="r">${num(p[1].q)} · ${money(p[1].ca)}</td></tr>`).join(""):`<tr><td colspan="2">Aucune vente</td></tr>`}
    </table>

    ${catArr.length?`<h4>Dépenses par catégorie</h4>
    <table><tr><th>Catégorie</th><th class="r">Montant</th></tr>
      ${catArr.map(c=>`<tr><td>${esc(c[0])}</td><td class="r">${money(c[1])}</td></tr>`).join("")}
    </table>`:""}

    <div class="rp-foot">${esc(set.nom)} · Rapport généré par l'application de gestion</div>

function printReport(){
  document.getElementById("printArea").innerHTML = reportPrintHTML();
  window.print();
}

function openProd(id){
  const p=id?prodById(id):null;
  openModal(p?"Modifier le produit":"Nouveau produit", `

  `);
}
function saveProd(id){
  const nom=document.getElementById("f_nom").value.trim();
  if(!nom){ toast("Indiquez un nom"); return; }
  const obj={ nom, cat:document.getElementById("f_cat").value, pv:parseFloat(document.getElementById("f_pv").value)||0, pr:parseFloat(document.getElementById("f_pr").value)||0, stock:parseFloat(document.getElementById("f_stock").value)||0, unite:document.getElementById("f_unite").value.trim()||"pièce", seuil:parseFloat(document.getElementById("f_seuil").value)||0 };
  if(id){ Object.assign(prodById(id),obj); toast("Produit modifié"); }
  else { db.produits.push({id:uid(),...obj}); toast("Produit ajouté"); }
  save(); closeOverlay(); setView(state.view);
}
function delProd(id){ if(!confirm("Supprimer ce produit ?")) return; db.produits=db.produits.filter(p=>p.id!==id); save(); closeOverlay(); toast("Produit supprimé"); setView(state.view); }

let mType="entree";
function openStock(id){
  if(!db.produits.length){ toast("Ajoutez d'abord un produit"); return; }
  const opts=db.produits.map(p=>`<option value="${p.id}" ${p.id===id?"selected":""}>${esc(p.nom)} (stock ${num(p.stock)})</option>`).join("");
  openModal("Mouvement de stock", `
    <div class="field"><label>Produit</label><select id="m_prod">${opts}</select></div>
    <div class="field"><label>Type de mouvement</label>
      <div class="seg" id="m_typeSeg">
        <div class="opt on" data-action="pickMtype" data-t="entree">＋ Entrée</div>
        <div class="opt" data-action="pickMtype" data-t="sortie">− Sortie</div>
        <div class="opt" data-action="pickMtype" data-t="ajust">= Ajuster</div>
      </div>
    </div>
    <div class="field"><label id="m_qlabel">Quantité à ajouter</label><input id="m_qte" class="num" inputmode="decimal" placeholder="0"></div>
    <div class="field"><label>Note (facultatif)</label><input id="m_note" placeholder="Ex : réappro, casse, inventaire…"></div>
    <button class="btn btn-primary btn-block" data-action="saveStock">Valider le mouvement</button>
  `);
  mType="entree";
}
function saveStock(){
  const id=document.getElementById("m_prod").value; const p=prodById(id); if(!p) return;
  const q=parseFloat(document.getElementById("m_qte").value);
  if(isNaN(q)){ toast("Indiquez une quantité"); return; }
  const note=document.getElementById("m_note").value.trim();
  let delta;
  if(mType==="entree"){ p.stock=Number(p.stock)+q; delta=q; }
  else if(mType==="sortie"){ p.stock=Number(p.stock)-q; delta=-q; }
  else { delta=q-Number(p.stock); p.stock=q; }
  db.mouvements.push({id:uid(),date:new Date().toISOString(),produitId:id,type:mType,qte:delta,note});
  save(); closeOverlay(); toast("Stock mis à jour"); setView(state.view);
}

}
function savePay(){
  const eid=document.getElementById("p_emp").value; const e=empById(eid); if(!e) return;
  const montant=parseFloat(document.getElementById("p_montant").value);
  if(!montant||montant<=0){ toast("Indiquez un montant"); return; }
  const dval=document.getElementById("p_date").value;
  db.paiements.push({ id:uid(), date: dval?new Date(dval+"T12:00:00").toISOString():new Date().toISOString(), employeId:eid, employeNom:e.nom, type:document.getElementById("p_type").value, montant, periode:document.getElementById("p_periode").value.trim() });
  save(); closeOverlay(); toast("Paiement enregistré"); setView(state.view);
}
function delPay(id){ if(!confirm("Supprimer ce paiement ?")) return; db.paiements=db.paiements.filter(p=>p.id!==id); save(); toast("Supprimé"); setView(state.view); }

/* ---- Clients ---- */
function openClient(id){
  const c=id?clientById(id):null;
  openModal(c?"Modifier le client":"Nouveau client", `
    <div class="field"><label>Nom du client</label><input id="cl_nom" value="${c?esc(c.nom):""}" placeholder="Ex : Madame Joseph"></div>
    <div class="field"><label>Téléphone (facultatif)</label><input id="cl_tel" inputmode="tel" value="${c?esc(c.telephone||""):""}" placeholder="+509 …"></div>
    <button class="btn btn-primary btn-block" data-action="saveClient" ${id?`data-id="${id}"`:""}>${c?"Enregistrer":"Ajouter le client"}</button>
  `);
}
function saveClient(id){
  const nom=document.getElementById("cl_nom").value.trim();
  if(!nom){ toast("Indiquez un nom"); return; }
  const tel=document.getElementById("cl_tel").value.trim();
  if(id){ Object.assign(clientById(id),{nom,telephone:tel}); save(); closeOverlay(); toast("Client modifié"); openClientDetail(id); return; }
  const nid=uid(); db.clients.push({id:nid,nom,telephone:tel}); save();
  if(state.quickClientForCart){ state.quickClientForCart=false; state.cartClientId=nid; closeOverlay(); toast("Client ajouté"); if(state.view==="vente") refreshCart(); else setView(state.view); return; }
  closeOverlay(); toast("Client ajouté"); setView(state.view);
}
function delClient(id){
  const bal=clientBalance(id);
  if(bal>0 && !confirm("Ce client doit encore "+money(bal)+". Supprimer quand même ?")) return;
  if(bal<=0 && !confirm("Supprimer ce client ?")) return;
  db.clients=db.clients.filter(c=>c.id!==id);
  save(); closeOverlay(); toast("Client supprimé"); setView("clients");
}
function openReglement(id){
  const c=clientById(id); if(!c) return;
  const bal=clientBalance(id);
  openModal("Règlement — "+c.nom, `
    <p class="hint" style="margin-bottom:13px">Solde actuel : <b>${money(bal)}</b>. Le montant encaissé entrera dans la caisse.</p>
    <div class="field"><label>Montant reçu</label><input id="rg_montant" class="num" inputmode="decimal" value="${bal>0?bal:""}" placeholder="0"></div>
    <div class="field"><label>Date</label><input id="rg_date" type="date" value="${todayKey()}"></div>
    <button class="btn btn-primary btn-block" data-action="saveReglement" data-id="${id}">Encaisser le règlement</button>
  `);
}
function saveReglement(id){
  const c=clientById(id); if(!c) return;
  const montant=parseFloat(document.getElementById("rg_montant").value);
  if(!montant||montant<=0){ toast("Indiquez un montant"); return; }
  const dval=document.getElementById("rg_date").value; const u=activeUser();
  db.reglements.push({ id:uid(), date: dval?new Date(dval+"T12:00:00").toISOString():new Date().toISOString(), clientId:id, clientNom:c.nom, montant, userId:u.id, userNom:u.nom });
  save(); toast("Règlement encaissé"); openClientDetail(id);
}
function delReglement(id, cid){
  if(!confirm("Supprimer ce règlement ?")) return;
  db.reglements=db.reglements.filter(r=>r.id!==id);
  save(); toast("Supprimé"); if(cid) openClientDetail(cid); else setView("clients");
}

/* ---- Caissiers ---- */
function openCaissier(id){
  const c=id?db.caissiers.find(x=>x.id===id):null;
  const role=c?(c.role||"caissier"):"caissier";
  openModal(c?"Modifier l'utilisateur":"Nouvel utilisateur", `
    <div class="field"><label>Nom (affiché)</label><input id="ca_nom" value="${c?esc(c.nom):""}" placeholder="Ex : Marie"></div>
    <div class="field"><label>Identifiant de connexion</label><input id="ca_login" autocapitalize="none" autocorrect="off" value="${c?esc(c.login||""):""}" placeholder="ex : marie"></div>
    <div class="field"><label>Mot de passe ${c?"(laisser vide = inchangé)":""}</label><input id="ca_pass" type="password" placeholder="${c?"•••••• (inchangé)":"au moins 4 caractères"}"></div>
    <div class="field"><label>Rôle</label>
      <div class="seg" id="ca_roleSeg">
        <div class="opt ${role==="caissier"?"on":""}" data-action="pickRole" data-r="caissier">👤 Caissier</div>
        <div class="opt ${role==="admin"?"on":""}" data-action="pickRole" data-r="admin">🛡️ Administrateur</div>
      </div>
      <input type="hidden" id="ca_role" value="${role}">
    </div>
    <button class="btn btn-primary btn-block" data-action="saveCaissier" ${id?`data-id="${id}"`:""}>${c?"Enregistrer":"Ajouter"}</button>
    ${c?`<button class="btn btn-danger btn-block" data-action="delCaissier" data-id="${id}" style="margin-top:9px">Supprimer</button>`:""}
  `);
}
function saveCaissier(id){
  const nom=document.getElementById("ca_nom").value.trim();
  if(!nom){ toast("Indiquez un nom"); return; }
  const login=document.getElementById("ca_login").value.trim();
  if(login.length<3){ toast("Identifiant : au moins 3 caractères"); return; }
  if(db.caissiers.some(c=>c.id!==id && (c.login||"").toLowerCase()===login.toLowerCase())){ toast("Cet identifiant est déjà pris"); return; }
  const passRaw=document.getElementById("ca_pass").value||"";
  const role=document.getElementById("ca_role").value==="admin"?"admin":"caissier";
  if(id){
    const c=db.caissiers.find(x=>x.id===id);
    if(role!=="admin" && c.role==="admin" && db.caissiers.filter(x=>x.role==="admin").length<=1){ toast("Gardez au moins un administrateur"); return; }
    if(passRaw){ if(passRaw.length<4){ toast("Mot de passe : au moins 4 caractères"); return; } c.password=hashStr(passRaw); }
    c.nom=nom; c.login=login; c.role=role; toast("Utilisateur modifié");
  } else {
    if(passRaw.length<4){ toast("Mot de passe : au moins 4 caractères"); return; }
    db.caissiers.push({id:uid(),nom,login,password:hashStr(passRaw),role}); toast("Utilisateur ajouté");
  }
  save(); closeOverlay(); setView("caissiers");
}
function delCaissier(id){
  if(db.caissiers.length<=1){ toast("Au moins un utilisateur est requis"); return; }
  if(id===authUserId){ toast("Impossible : compte connecté"); return; }
  const c=db.caissiers.find(x=>x.id===id);
  if(c.role==="admin" && db.caissiers.filter(x=>x.role==="admin").length<=1){ toast("Gardez au moins un administrateur"); return; }
  if(!confirm("Supprimer cet utilisateur ?")) return;
  db.caissiers=db.caissiers.filter(c=>c.id!==id);
  save(); closeOverlay(); toast("Utilisateur supprimé"); setView("caissiers");
}

/* ---- Caisse / panier ---- */
function addCart(id){
  const p=prodById(id); if(!p) return;
  const ex=state.cart.find(l=>l.id===id);
  if(ex) ex.qte++; else state.cart.push({id, nom:p.nom, prix:Number(p.pv), qte:1});
  refreshCart();
}
function checkout(){
  if(!state.cart.length) return;
  const total=sum(state.cart,l=>l.qte*l.prix);
  if(currentPay==="Crédit" && !state.cartClientId){ toast("Choisissez un client pour le crédit"); return; }
  const client=state.cartClientId?clientById(state.cartClientId):null;
  const recu=currentPay==="Espèces"?(parseFloat(state.cartRecu)||0):0;
  const numero=(db.settings.compteurVente=(db.settings.compteurVente||0)+1);
  const u=activeUser();
  const sale={ id:uid(), numero, date:new Date().toISOString(), items:state.cart.map(l=>({produitId:l.id,nom:l.nom,prix:l.prix,qte:l.qte})), total, paiement:currentPay, clientId:client?client.id:null, clientNom:client?client.nom:"", recu:recu||null, monnaie:(recu&&currentPay==="Espèces")?Math.max(0,recu-total):null, userId:u.id, userNom:u.nom };
  db.ventes.push(sale);
  state.cart.forEach(l=>{ const p=prodById(l.id); if(p) p.stock=Number(p.stock)-l.qte; });
  state.cart=[]; state.cartClientId=""; state.cartRecu=""; currentPay="Espèces";
  save();
  setView("vente");
  showReceipt(sale.id, true);
}

/* ---- Paramètres / données ---- */
function saveSettings(){
  db.settings.nom=document.getElementById("setNom").value.trim()||"Ma Boulangerie";
  db.settings.adresse=document.getElementById("setAdresse").value.trim();
  db.settings.telephone=document.getElementById("setTel").value.trim();
  db.settings.devise=document.getElementById("setDevise").value.trim()||"HTG";
  db.settings.caisseInitiale=parseFloat(document.getElementById("setCaisse").value)||0;
  save(); document.getElementById("brandName").textContent=db.settings.nom;
  toast("Paramètres enregistrés"); setView("parametres");
}
function exportData(){
  const blob=new Blob([JSON.stringify(db,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download="sauvegarde-boulangerie-"+todayKey()+".json";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500); toast("Sauvegarde exportée");
}
function importData(){ const f=document.getElementById("importFile"); if(f) f.click(); }
function handleImportFile(ev){
  const file=ev.target.files&&ev.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{ try{
    const data=JSON.parse(reader.result);
    if(!data||typeof data!=="object"||!("settings" in data)) throw new Error("format");
    ["produits","ventes","decaissements","employes","paiements","mouvements","clients","reglements","caissiers"].forEach(k=>{ if(!Array.isArray(data[k])) data[k]=[]; });
    if(!data.caissiers.length) data.caissiers=[{id:uid(),nom:"Caissier 1",pin:""}];
    if(!data.caissiers.find(c=>c.id===data.settings.activeUserId)) data.settings.activeUserId=data.caissiers[0].id;
    if(!confirm("Importer cette sauvegarde ? Les données actuelles seront remplacées.")) return;
    db=data; authUserId=null; save(); toast("Sauvegarde importée"); boot();
  }catch(e){ toast("Fichier invalide"); } };
  reader.readAsText(file);
}
function resetData(){
  if(!confirm("Effacer TOUTES les données ? Cette action est irréversible.")) return;
  if(!confirm("Êtes-vous vraiment sûr ? Pensez à exporter une sauvegarde avant.")) return;
  db=defaultData(); authUserId=null; save(); toast("Données réinitialisées"); boot();
}

/* ============================ Gestionnaire de clics ============================ */
document.addEventListener("click", e => {
  if(e.target.classList && e.target.classList.contains("overlay")){ closeOverlay(); return; }
  const navEl=e.target.closest("[data-nav]");
  if(navEl){ closeOverlay(); setView(navEl.dataset.nav); return; }
  const el=e.target.closest("[data-action]");
  if(!el) return;
  const a=el.dataset.action; const id=el.dataset.id;
  switch(a){
    case "close": closeOverlay(); break;
    case "switchUser": openUserSwitcher(); break;
    case "switchTo": switchTo(id); break;
    case "confirmSwitch": confirmSwitch(id); break;
    case "logout": logout(); break;
    case "goEnter": goEnter(); break;
    case "goWelcome": goWelcome(); break;
    case "pickLogin": pickLogin(id); break;
    case "doLogin": doLogin(); break;
    case "doSetup": doSetup(); break;
    case "openCaissier": openCaissier(id); break;
    case "saveCaissier": saveCaissier(id); break;
    case "delCaissier": delCaissier(id); break;
    case "pickRole": { const r=el.dataset.r; const h=document.getElementById("ca_role"); if(h) h.value=r; document.querySelectorAll("#ca_roleSeg .opt").forEach(o=>o.classList.remove("on")); el.classList.add("on"); break; }
    // produits
    case "openProd": openProd(id); break;
    case "saveProd": saveProd(id); break;
    case "delProd": delProd(id); break;
    // stock
    case "openStock": openStock(id); break;
    case "saveStock": saveStock(); break;
    case "pickMtype": { mType=el.dataset.t; document.querySelectorAll("#m_typeSeg .opt").forEach(o=>o.classList.remove("on")); el.classList.add("on"); const lbl=document.getElementById("m_qlabel"); if(lbl) lbl.textContent=mType==="entree"?"Quantité à ajouter":mType==="sortie"?"Quantité à retirer":"Nouveau stock (valeur exacte)"; break; }
    // décaissements
    case "openDec": openDec(); break;
    case "saveDec": saveDec(); break;
    case "delDec": delDec(id); break;
    // clients
    case "openClient": openClient(id); break;
    case "saveClient": saveClient(id); break;
    case "delClient": delClient(id); break;
    case "clientDetail": openClientDetail(id); break;
    case "quickClient": state.quickClientForCart=true; openClient(); break;
    case "openReglement": openReglement(id); break;
    case "saveReglement": saveReglement(id); break;
    case "delReglement": delReglement(id, el.dataset.cid); break;
    // employés
    case "openEmp": openEmp(id); break;
    case "saveEmp": saveEmp(id); break;
    case "delEmp": delEmp(id); break;
    // paie
    case "openPay": openPay(); break;
    case "savePay": savePay(); break;
    case "delPay": delPay(id); break;
    // ventes / reçus
    case "showReceipt": showReceipt(id, false); break;
    case "printReceipt": printReceipt(id); break;
    case "doneSale": closeOverlay(); setView("vente"); break;
    // caisse
    case "addCart": addCart(id); break;
    case "cartInc": { state.cart[+el.dataset.i].qte++; refreshCart(); break; }
    case "cartDec": { const i=+el.dataset.i; if(--state.cart[i].qte<=0) state.cart.splice(i,1); refreshCart(); break; }
    case "clearCart": state.cart=[]; state.cartClientId=""; state.cartRecu=""; refreshCart(); break;
    case "checkout": checkout(); break;
    case "pickPay": { currentPay=el.dataset.pay; document.querySelectorAll("#paySeg .opt").forEach(o=>o.classList.remove("on")); el.classList.add("on"); const cf=document.getElementById("cashField"); if(cf) cf.style.display=currentPay==="Espèces"?"":"none"; break; }
    // rapports
    case "pickPeriod": reportPeriod=el.dataset.p; setView("rapports"); break;
    case "printReport": printReport(); break;
    // paramètres
    case "saveSettings": saveSettings(); break;
    case "exportData": exportData(); break;
    case "importData": importData(); break;
    case "resetData": resetData(); break;
  }
});

/* ============================ Démarrage ============================ */
boot();
</script>
<script>if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("sw.js").catch(function(){});});}</script>
